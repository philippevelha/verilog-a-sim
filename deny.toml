# cargo-deny configuration.
#
# House rule (§5): pure-Rust numerics only. No `cgo`, no native-link / FFI deps
# (BLAS/LAPACK/KLU/SuiteSparse). Reproducible `cargo build` is a project requirement.
#
# Run with: cargo deny check

[advisories]
version = 2
yanked = "deny"

[licenses]
version = 2
allow = ["MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception", "BSD-3-Clause", "Unicode-3.0", "Zlib"]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Deny crates that exist solely to link a native library. Extend this list as the
# dependency tree grows; the intent is "no `-sys` / FFI shims sneak in".
deny = [
    { name = "openblas-src" },
    { name = "openblas-sys" },
    { name = "blas-src" },
    { name = "lapack-src" },
    { name = "lapack-sys" },
    { name = "intel-mkl-src" },
    { name = "netlib-src" },
    { name = "suitesparse-sys" },
    { name = "klu-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
